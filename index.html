<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LA-Music</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="container">
            <div class="title">
                <h1>LA-Music</h1>
            </div>
            <div class="navigations">
                <a href="#">Home</a>
                <a href="#">My music</a>
            </div>
        </div>
    </nav>
    <div class="music-player">
            <div class="playlists">
                <ul>1</ul>
                <ul>2</ul>
                <ul>3</ul>
                <ul>4</ul>
                <ul>5</ul>
                <ul>6</ul>
                <ul>7</ul>
                <ul>8</ul>
                <ul>9</ul>
                <ul>0</ul>
            </div>
            <div class="songs">
                <ul id="playlist"></ul>
            </div>
    </div>
    <div class="controller-section">
        
            <div class="song-details">
                <img id="cover" src="" alt="Album cover">
                <h2 id="title">Select a song</h2>
            </div>
            <div class="playtime-details">
                <audio id="player" controls></audio>
            </div>
            <div class="music-controls"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
